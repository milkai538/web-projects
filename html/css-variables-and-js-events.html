<!DOCTYPE html>
<html>
<head>
    <title>CSS Variables & JS Events</title>
    <style>
        :root {
            /*create a CSS variable */
          --main-color:orange;
        }
        
        #box {
            width: 200px;
            height: 200px;

            background-color: var(--main-color);

            margin: 20px;
         
            transition: background-color 0.3s;
        }

        button {
            padding: 10px 15px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div id="box"></div>
    
    <button id="changeColor">Change Color</button>


    <script>
        const changeColorButton=document.getElementById('changeColor');

        // Tell JS how to find the DIV on our page //
        const box = document.getElementById('box');

        // Step 1: Connect an event listener to the changeColorButton variable 
        // Step 2: Create and connect an arrow function to the changeColorButton

        // Function: A chunk or block of code that performs a specific task

        changeColorButton.addEventListener('click', () => {
            document.documentElement.style.setProperty('--main-color', 'purple');
        });

        

    </script>
</body>
</html>
