<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator</title>
    <link rel="stylesheet" href="code-along.css">
</head>

<body>

    <div class="container">
        
        <h1>Password Generator</h1>

        <label for="len">Password Length:
            <input type="number" id="len" min="6" value="12">
        </label>

        <label for="upper">Include Uppercase Letters
            <input type="checkbox" id="upper" checked>
        </label>

        <label for="nums">Include Numbers
            <input type="checkbox" id="nums" checked>
        </label>

        <label for="special">Include Special Characters
            <input type="checkbox" id="special" checked>
        </label>



        <div class="btn-group">

           <button class="btn" onclick="generate()">Generate</button>

           <button class="btn" onclick="reset()">Reset</button>

        </div>

        <div class="output" id="passOut">The generated password will appear here</div>


    </div>



    <script src="code-along.js"></script>
</body>
</html>
